name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build app and Lively packages
        run: npm run build:lively

      - name: Validate Lively archives
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            crumpled-paper
            wandering-ink
            breathing-membrane
            tide-archive
          )
          for package in "${expected[@]}"; do
            archive="lively-dist/${package}.zip"
            test -f "$archive"
            unzip -t "$archive"
            entries="$(unzip -Z1 "$archive")"
            grep -qx 'index.html' <<<"$entries"
            grep -qx 'LivelyInfo.json' <<<"$entries"
            grep -qx 'LivelyProperties.json' <<<"$entries"
          done

      - name: Upload Lively packages
        uses: actions/upload-artifact@v4
        with:
          name: lively-packages
          path: lively-dist/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser runtime tests
        run: npm run test:browser

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
